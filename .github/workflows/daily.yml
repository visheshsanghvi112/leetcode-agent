name: Daily LeetCode Solver

on:
  schedule:
    # Runs at 02:00 UTC every day (adjust as needed)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  solve-and-submit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Create session file from secret
        env:
          LEETCODE_SESSION_JSON: ${{ secrets.LEETCODE_SESSION_JSON }}
        run: |
          echo "$LEETCODE_SESSION_JSON" > leetcode_session.json

      - name: Run LeetCode Agent
        run: python main.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "visheshsanghvi112"
          git config --global user.email "visheshsanghvi112@gmail.com"
          git add solutions/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily LeetCode solution" && git push)
