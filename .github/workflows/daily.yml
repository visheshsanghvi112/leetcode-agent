name: Daily LeetCode Solver

on:
  schedule:
    # Runs at 01:30 UTC every day (07:00 AM IST)
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  solve-and-submit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Create session file from secret
        env:
          LEETCODE_SESSION_JSON: ${{ secrets.LEETCODE_SESSION_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${LEETCODE_SESSION_JSON:-}" ]; then
            echo "LEETCODE_SESSION_JSON is not set or empty."
            exit 1
          fi
          printf '%s' "$LEETCODE_SESSION_JSON" > leetcode_session.json
          python -m json.tool leetcode_session.json >/dev/null

      - name: Random daily delay (humanize)
        if: github.event_name == 'schedule'
        run: |
          # Sleep for a random time between 1 and 180 minutes (up to 3 hours)
          # This ensures the bot runs at a different time every morning IST.
          DELAY=$((RANDOM % 10800))
          echo "Sleeping for $DELAY seconds to humanize submission time..."
          sleep $DELAY

      - name: Run LeetCode Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "visheshsanghvi112"
          git config --global user.email "visheshsanghvi112@gmail.com"
          git add solutions/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily LeetCode solution" && git push)
